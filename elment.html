<form id="userForm" class="card">
    
    <div class="row">
        
        <div class="field">
            
            <label>First name</label>
            <input type="text" id="First-name">
        </div>
        <div class="field">
            <label>Last name</label>
            <input type="text" id="Last-name">
        </div>
        <div class="field">
            <label>Nickname</label>
            <input type="text" id="Nickname">
        </div>
        <div class="field">
            <label>Age</label>
            <input type="text" id="Age">
        </div>
    </div>
    <div class="field Gender">
        <label>Select Gender:</label>
        <select class="slc">
            <option value="Male" class="slc">Male</option>
            <option value="Female" class="slc">Female</option>
        </select>
    </div>
    <div class="field Email">
        <label>Email</label>
        <input id="Email" type="text">
    </div>
    <div class="field Password">
        <label>Password</label>
        <input id="Password" type="text">
    </div>
    <div class="field Confirm-password">
        <label>Confirm password</label>
        <input id="Confirm-password" type="text">
    </div>
    <button class="btn" type="submit">Create account</button>
    <p class="login-link">Already have an account?<a href="#" id="login-link">Sign in</a>
    </p>
</form>
